# SGX Enclave Configuration
#
# WARNING: Review all values before production deployment!

# Enable debug mode (allows debugger attachment via sgx-gdb)
# 0 = production mode (REQUIRED for production)
# 1 = debug mode (development only - enclave is NOT production-trusted)
Debug=1

# Heap memory available inside the enclave
# Total = NumHeapPages x 4KB
NumHeapPages=256

# Stack memory per thread inside the enclave
# Total = NumStackPages x 4KB
NumStackPages=256

# Number of Thread Control Structures
# Maximum number of concurrent threads allowed to enter the enclave
NumTCS=1

# Logical product identifier (uint16: 0-65535)
# Distinguishes this enclave from other products by the same signer
# Used in sealing and attestation identity
ProductID=1

# Security Version Number / SVN (uint16: 0-65535)
# Increment ONLY when patching a security vulnerability
# Higher SVN can unseal data from lower SVN - not vice versa
SecurityVersion=2


